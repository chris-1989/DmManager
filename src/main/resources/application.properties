# 达梦管理工具预设设定（可复制为 dm-admin-local.properties 并覆写）
# JDBC 驱动类名
dm.jdbc.driverClassName=dm.jdbc.driver.DmDriver
# 连接超时（毫秒）
dm.pool.connectionTimeoutMs=30000
dm.pool.validationTimeoutMs=5000
dm.pool.idleTimeoutMs=600000
dm.pool.maxLifetimeMs=1800000
dm.pool.maximumPoolSize=10
dm.pool.minimumIdle=2
# 失败重试次数（连接测试）
dm.connection.testRetries=2
dm.connection.retryDelayMs=1000
# DMP JNI：Windows 下达梦 bin 目录中的 DmDexpDimp.dll 所在目录，或留空使用 java.library.path
# 注意：路径请使用正斜杠 / 或双反斜杠 \\\\；单个 \\ 会被 Properties 当作转义符吃掉
dm.dimp.native.library.dir=D:/dmdbms/bin
# dimp.exe 完整路径（优先于此设定；若留空则自动使用 dm.dimp.native.library.dir 下的 dimp.exe）
dm.dimp.tool.path=D:/dmdbms/bin3/dimp.exe
# JNI 字串编码（Windows 常见 GBK）
dm.dimp.native.charset=GB18030
# 导入失败时是否尝试回滚（依赖 dimp 行为与备份策略，仅作为业务标志记录）
dm.dimp.rollbackOnFailure=true

